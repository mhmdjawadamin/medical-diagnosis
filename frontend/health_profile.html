<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Health Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
              <h1 class="text-center text-primary mb-4">
                Patient Health Profile
              </h1>
              <p class="text-muted text-center mb-4">
                Please complete your medical profile before continuing.
              </p>

              <form id="healthProfileForm">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    class="form-control"
                    name="full_name"
                    required
                  />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input
                      type="number"
                      class="form-control"
                      name="age"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender" required>
                      <option value="">Select</option>
                      <option>Male</option>
                      <option>Female</option>
                    </select>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Type</label>
                    <select class="form-select" name="blood_type">
                      <option value="">Select</option>
                      <option>A+</option>
                      <option>A-</option>
                      <option>B+</option>
                      <option>B-</option>
                      <option>AB+</option>
                      <option>AB-</option>
                      <option>O+</option>
                      <option>O-</option>
                    </select>
                  </div>

                  <div class="col-md-3 mb-3">
                    <label class="form-label">Height (cm)</label>
                    <input type="number" class="form-control" name="height" />
                  </div>

                  <div class="col-md-3 mb-3">
                    <label class="form-label">Weight (kg)</label>
                    <input type="number" class="form-control" name="weight" />
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Allergies</label>
                  <textarea
                    class="form-control"
                    name="allergies"
                    rows="2"
                    placeholder="Example: Penicillin, nuts"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Chronic Diseases</label>
                  <textarea
                    class="form-control"
                    name="chronic_diseases"
                    rows="2"
                    placeholder="Example: Diabetes, hypertension"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label"
                    >Current / Constant Medications</label
                  >
                  <textarea
                    class="form-control"
                    name="medications"
                    rows="2"
                    placeholder="Example: Insulin, blood pressure medication"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Past Surgeries</label>
                  <textarea
                    class="form-control"
                    name="past_surgeries"
                    rows="2"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Smoking Status</label>
                  <select class="form-select" name="smoking_status">
                    <option value="">Select</option>
                    <option>Non-smoker</option>
                    <option>Former smoker</option>
                    <option>Current smoker</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Family Medical History</label>
                  <textarea
                    class="form-control"
                    name="family_history"
                    rows="2"
                    placeholder="Example: Heart disease, diabetes"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Emergency Contact</label>
                  <input
                    type="text"
                    class="form-control"
                    name="emergency_contact"
                    placeholder="Name and phone number"
                  />
                </div>

                <div class="d-grid mt-4">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg rounded-3"
                  >
                    Save Profile
                  </button>
                </div>
              </form>

              <div id="profileMessage" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("healthProfileForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          let formData = {
            age: document.querySelector("[name='age']").value,
            gender: document.querySelector("[name='gender']").value,
            blood_type: document.querySelector("[name='blood_type']").value,
            height: document.querySelector("[name='height']").value,
            weight: document.querySelector("[name='weight']").value,
            allergies: document.querySelector("[name='allergies']").value,
            chronic_diseases: document.querySelector(
              "[name='chronic_diseases']",
            ).value,
            medications: document.querySelector("[name='medications']").value,
            past_surgeries: document.querySelector("[name='past_surgeries']")
              .value,
            smoking_status: document.querySelector("[name='smoking_status']")
              .value,
            family_history: document.querySelector("[name='family_history']")
              .value,
            emergency_contact: document.querySelector(
              "[name='emergency_contact']",
            ).value,
          };

          fetch("/senior_project/backend/save_profile.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          })
            .then((response) => response.json())
            .then((data) => {
              let msg = document.getElementById("profileMessage");

              if (data.success) {
                msg.innerHTML = `<div class="alert alert-success">${data.message}</div>`;

                setTimeout(() => {
                  window.location.href = "index.html";
                }, 1000);
              } else {
                msg.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
              }
            })
            .catch((error) => {
              document.getElementById("profileMessage").innerHTML =
                `<div class="alert alert-danger">Error: ${error}</div>`;
            });
        });
    </script>
  </body>
</html>
