<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Profile - AI Medical Assistant</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f9ff;
      }

      .navbar {
        background: linear-gradient(90deg, #0d6efd, #0b5ed7);
      }

      .profile-card {
        border: none;
        border-radius: 26px;
        box-shadow: 0 18px 45px rgba(13, 110, 253, 0.12);
      }

      .section-card {
        border: none;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        padding: 24px;
        margin-bottom: 22px;
      }

      .section-title {
        font-weight: 700;
        color: #0b2c4d;
        margin-bottom: 18px;
      }

      .section-icon {
        color: #0d6efd;
        margin-right: 8px;
      }

      .form-control,
      .form-select {
        border-radius: 14px;
        padding: 12px 14px;
      }

      .form-control:focus,
      .form-select:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
      }

      .btn {
        border-radius: 14px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="dashboard.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          AI Medical Assistant
        </a>

        <div class="ms-auto d-flex gap-2">
          <a href="dashboard.html" class="btn btn-outline-light btn-sm px-3">
            <i class="bi bi-grid me-1"></i> Dashboard
          </a>
          <a href="history.html" class="btn btn-outline-light btn-sm px-3">
            <i class="bi bi-clock-history me-1"></i> History
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="card profile-card">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-5">
            <h1 class="fw-bold text-primary">
              <i class="bi bi-person-vcard me-2"></i>
              Patient Health Profile
            </h1>
            <p class="text-muted mb-0">
              Complete your medical profile to unlock the AI Analyzer and
              improve personalized risk detection.
            </p>
          </div>

          <form id="healthProfileForm">
            <div class="section-card">
              <h5 class="section-title">
                <i class="bi bi-person section-icon"></i>
                Personal Information
              </h5>

              <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  name="full_name"
                  placeholder="Enter full name"
                  required
                />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Age</label>
                  <input
                    type="number"
                    class="form-control"
                    name="age"
                    placeholder="Enter age"
                    required
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Gender</label>
                  <select class="form-select" name="gender" required>
                    <option value="">Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold">Blood Type</label>
                  <select class="form-select" name="blood_type">
                    <option value="">Select blood type</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold">Height (cm)</label>
                  <input
                    type="number"
                    class="form-control"
                    name="height"
                    placeholder="Example: 175"
                  />
                </div>

                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold">Weight (kg)</label>
                  <input
                    type="number"
                    class="form-control"
                    name="weight"
                    placeholder="Example: 70"
                  />
                </div>
              </div>
            </div>

            <div class="section-card">
              <h5 class="section-title">
                <i class="bi bi-clipboard2-pulse section-icon"></i>
                Medical Details
              </h5>

              <div class="mb-3">
                <label class="form-label fw-semibold">Allergies</label>
                <textarea
                  class="form-control"
                  name="allergies"
                  rows="2"
                  placeholder="Example: Penicillin, nuts"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Chronic Diseases</label>
                <textarea
                  class="form-control"
                  name="chronic_diseases"
                  rows="2"
                  placeholder="Example: Diabetes, hypertension, asthma"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">
                  Current / Constant Medications
                </label>
                <textarea
                  class="form-control"
                  name="medications"
                  rows="2"
                  placeholder="Example: Insulin, blood pressure medication"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Past Surgeries</label>
                <textarea
                  class="form-control"
                  name="past_surgeries"
                  rows="2"
                  placeholder="Example: Appendix surgery, heart surgery"
                ></textarea>
              </div>
            </div>

            <div class="section-card">
              <h5 class="section-title">
                <i class="bi bi-shield-heart section-icon"></i>
                Lifestyle & Family History
              </h5>

              <div class="mb-3">
                <label class="form-label fw-semibold">Smoking Status</label>
                <select class="form-select" name="smoking_status">
                  <option value="">Select smoking status</option>
                  <option>Non-smoker</option>
                  <option>Former smoker</option>
                  <option>Current smoker</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"
                  >Family Medical History</label
                >
                <textarea
                  class="form-control"
                  name="family_history"
                  rows="2"
                  placeholder="Example: Heart disease, diabetes"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Emergency Contact</label>
                <input
                  type="text"
                  class="form-control"
                  name="emergency_contact"
                  placeholder="Name and phone number"
                />
              </div>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                <span id="saveBtnText">
                  <i class="bi bi-save me-2"></i>
                  Save Health Profile
                </span>
                <span
                  id="saveSpinner"
                  class="spinner-border spinner-border-sm d-none"
                ></span>
              </button>
            </div>
          </form>

          <div id="profileMessage" class="mt-3"></div>
        </div>
      </div>
    </main>

    <script>
      document
        .getElementById("healthProfileForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const msg = document.getElementById("profileMessage");
          const saveBtnText = document.getElementById("saveBtnText");
          const saveSpinner = document.getElementById("saveSpinner");

          let formData = {
            full_name: document.querySelector("[name='full_name']").value,
            age: document.querySelector("[name='age']").value,
            gender: document.querySelector("[name='gender']").value,
            blood_type: document.querySelector("[name='blood_type']").value,
            height: document.querySelector("[name='height']").value,
            weight: document.querySelector("[name='weight']").value,
            allergies: document.querySelector("[name='allergies']").value,
            chronic_diseases: document.querySelector(
              "[name='chronic_diseases']",
            ).value,
            medications: document.querySelector("[name='medications']").value,
            past_surgeries: document.querySelector("[name='past_surgeries']")
              .value,
            smoking_status: document.querySelector("[name='smoking_status']")
              .value,
            family_history: document.querySelector("[name='family_history']")
              .value,
            emergency_contact: document.querySelector(
              "[name='emergency_contact']",
            ).value,
          };

          saveBtnText.classList.add("d-none");
          saveSpinner.classList.remove("d-none");
          msg.innerHTML = "";

          fetch("/senior_project/backend/save_profile.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          })
            .then((response) => response.json())
            .then((data) => {
              saveBtnText.classList.remove("d-none");
              saveSpinner.classList.add("d-none");

              if (data.success) {
                msg.innerHTML = `
                  <div class="alert alert-success rounded-4">
                    <i class="bi bi-check-circle me-2"></i>
                    ${data.message}
                    <br>
                    Redirecting to dashboard...
                  </div>
                `;

                setTimeout(() => {
                  window.location.href = "dashboard.html";
                }, 1000);
              } else {
                msg.innerHTML = `
                  <div class="alert alert-danger rounded-4">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    ${data.message}
                  </div>
                `;
              }
            })
            .catch((error) => {
              saveBtnText.classList.remove("d-none");
              saveSpinner.classList.add("d-none");

              msg.innerHTML = `
                <div class="alert alert-danger rounded-4">
                  Error: ${error}
                </div>
              `;
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
