<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Medical Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
              <h2 class="text-center text-primary mb-4">Login</h2>
              <p class="text-center text-muted">
                Access your AI Medical Assistant account
              </p>

              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>

                <div class="d-grid">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg rounded-3"
                  >
                    Login
                  </button>
                </div>
              </form>

              <div id="loginMessage" class="mt-3"></div>

              <div class="text-center mt-4">
                <p class="mb-0">
                  Don't have an account?
                  <a href="register.html" class="text-decoration-none"
                    >Register here</a
                  >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let canUseAnalyzer = false;

      fetch("/senior_project/backend/check_profile.php")
        .then((response) => response.json())
        .then((data) => {
          const output = document.getElementById("output");

          if (data.has_profile) {
            canUseAnalyzer = true;
          } else {
            canUseAnalyzer = false;

            // Block page usage visually
            output.innerHTML = `
            <div class="alert alert-warning">
                <h4>Access Restricted</h4>
                You must complete your health profile before using the AI analyzer.
                <br><br>
                <a href="health_profile.html" class="btn btn-warning">Complete Health Profile</a>
            </div>
        `;
          }
        })
        .catch((error) => {
          document.getElementById("output").innerHTML = `
        <div class="alert alert-danger">
            Error checking profile: ${error}
        </div>
    `;
        });
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          let email = document.getElementById("email").value;
          let password = document.getElementById("password").value;
          let messageBox = document.getElementById("loginMessage");

          if (email === "" || password === "") {
            messageBox.innerHTML = `<div class="alert alert-danger">Please fill in all fields.</div>`;
            return;
          }

          fetch("/senior_project/backend/login.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          })
            .then((response) => response.text())
            .then((data) => {
              console.log(data);

              try {
                let json = JSON.parse(data);

                if (json.success) {
                  messageBox.innerHTML = `<div class="alert alert-success">${json.message}</div>`;

                  setTimeout(() => {
                    window.location.href = "dashboard.html";
                  }, 1000);
                } else {
                  messageBox.innerHTML = `<div class="alert alert-danger">${json.message}</div>`;
                }
              } catch (e) {
                messageBox.innerHTML = `<div class="alert alert-danger">Server Error:<br><pre>${data}</pre></div>`;
              }
            })
            .catch((error) => {
              messageBox.innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
            });
        });
    </script>
  </body>
</html>
