<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Medical Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html"
          >AI Medical Assistant</a
        >
        <div class="ms-auto">
          <a href="dashboard.html" class="btn btn-light me-2">Dashboard</a>
          <a href="health_profile.html" class="btn btn-outline-light"
            >Health Profile</a
          >
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div id="accessWarning"></div>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
              <h1 class="text-center mb-4 text-primary">
                AI Medical Assistant
              </h1>

              <div class="mb-3">
                <label for="symptoms" class="form-label fw-bold"
                  >Enter your symptoms</label
                >
                <textarea
                  id="symptoms"
                  class="form-control"
                  rows="5"
                  placeholder="Example: I have high fever for 3 days and strong headache with body pain"
                ></textarea>
              </div>

              <div class="d-grid">
                <button
                  class="btn btn-primary btn-lg rounded-3"
                  onclick="analyzeSymptoms()"
                  id="analyzeBtn"
                >
                  Analyze
                </button>
              </div>
            </div>
          </div>

          <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-4">
              <h2 class="mb-3 text-success">Result</h2>
              <div id="output">
                <p class="text-muted">Your analysis result will appear here.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let canUseAnalyzer = false;

      fetch("/senior_project/backend/check_profile.php")
        .then((response) => response.json())
        .then((data) => {
          const output = document.getElementById("output");
          const analyzeBtn = document.getElementById("analyzeBtn");
          const symptomsBox = document.getElementById("symptoms");
          const accessWarning = document.getElementById("accessWarning");

          if (data.has_profile) {
            canUseAnalyzer = true;
          } else {
            canUseAnalyzer = false;

            analyzeBtn.disabled = true;
            symptomsBox.disabled = true;

            accessWarning.innerHTML = `
                        <div class="alert alert-danger shadow-sm">
                            <h4 class="alert-heading">Access Denied</h4>
                            <p class="mb-2">
                                You cannot use the AI Symptom Analyzer until you complete your health profile.
                            </p>
                            <hr>
                            <a href="health_profile.html" class="btn btn-warning">Complete Health Profile</a>
                        </div>
                    `;

            output.innerHTML = `
                        <div class="alert alert-warning">
                            The analyzer is locked until your health profile is completed.
                        </div>
                    `;
          }
        })
        .catch((error) => {
          document.getElementById("accessWarning").innerHTML = `
                    <div class="alert alert-danger">
                        Error checking profile status: ${error}
                    </div>
                `;
        });

      function analyzeSymptoms() {
        if (!canUseAnalyzer) {
          document.getElementById("accessWarning").innerHTML = `
                    <div class="alert alert-danger shadow-sm">
                        <h4 class="alert-heading">Access Denied</h4>
                        <p class="mb-2">
                            Please complete your health profile before using the AI Symptom Analyzer.
                        </p>
                        <hr>
                        <a href="health_profile.html" class="btn btn-warning">Complete Health Profile</a>
                    </div>
                `;
          return;
        }

        let text = document.getElementById("symptoms").value;
        let output = document.getElementById("output");

        if (text.trim() === "") {
          output.innerHTML = `<div class="alert alert-danger">Please enter your symptoms first.</div>`;
          return;
        }

        output.innerHTML = `<p class="text-info">Analyzing symptoms...</p>`;

        fetch("/senior_project/backend/analyze.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ symptoms: text }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.error) {
              output.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
              return;
            }

            let severityClass = "secondary";
            if (data.severity_level === "High") severityClass = "danger";
            else if (data.severity_level === "Medium")
              severityClass = "warning";
            else if (data.severity_level === "Low") severityClass = "success";

            output.innerHTML = `
<div class="card shadow border-0 rounded-4 p-4">

    <h3 class="text-primary mb-4">Diagnosis Result</h3>

    <div class="row g-3">

        <div class="col-md-6">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Possible Disease</h6>
                <h5 class="fw-bold text-primary">${data.predicted_disease}</h5>
            </div>
        </div>

        <div class="col-md-6">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Confidence</h6>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: ${data.confidence_score * 100}%">
                        ${data.confidence_score * 100}%
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Severity</h6>
                <span class="badge bg-${severityClass} fs-6">${data.severity_level}</span>
            </div>
        </div>

        <div class="col-md-6">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Duration</h6>
                <p class="mb-0">${data.duration_days} day(s)</p>
            </div>
        </div>

        <div class="col-12">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Detected Symptoms</h6>
                <p class="mb-0">${data.detected_symptoms.join(", ")}</p>
            </div>
        </div>

        <div class="col-12">
            <div class="p-3 bg-light rounded-3">
                <h6 class="text-muted">Recommended Doctor</h6>
                <p class="fw-bold text-success">${data.recommended_doctor}</p>
            </div>
        </div>

    </div>

    <div class="alert alert-warning mt-4">
        <strong>Disclaimer:</strong> This system does not replace a real doctor.
    </div>

</div>
`;
          })
          .catch((error) => {
            output.innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
          });
      }
    </script>
  </body>
</html>
