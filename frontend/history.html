<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction History - AI Medical Assistant</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f9ff;
      }

      .navbar {
        background: linear-gradient(90deg, #0d6efd, #0b5ed7);
      }

      .page-card,
      .history-card {
        border: none;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(13, 110, 253, 0.08);
      }

      .history-card {
        transition: 0.3s ease;
      }

      .history-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 40px rgba(13, 110, 253, 0.14);
      }

      .info-box {
        background: #f8fbff;
        border-radius: 18px;
        padding: 18px;
        height: 100%;
      }

      .info-title {
        color: #6c757d;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .risk-badge {
        border-radius: 50px;
        padding: 8px 14px;
        font-size: 0.9rem;
      }

      .empty-state {
        border: none;
        border-radius: 24px;
        background: white;
        box-shadow: 0 12px 30px rgba(13, 110, 253, 0.08);
      }

      .empty-icon {
        width: 78px;
        height: 78px;
        border-radius: 24px;
        background: rgba(13, 110, 253, 0.1);
        color: #0d6efd;
        font-size: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }

      .btn {
        border-radius: 14px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="dashboard.html">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          AI Medical Assistant
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#historyNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="historyNavbar">
          <div class="ms-auto d-flex gap-2 mt-3 mt-lg-0">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm px-3">
              <i class="bi bi-grid me-1"></i> Dashboard
            </a>

            <a href="index.html" class="btn btn-outline-light btn-sm px-3">
              <i class="bi bi-cpu me-1"></i> Analyzer
            </a>

            <a
              href="health_profile.html"
              class="btn btn-outline-light btn-sm px-3"
            >
              <i class="bi bi-person-vcard me-1"></i> Profile
            </a>

            <button onclick="logout()" class="btn btn-danger btn-sm px-3">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="card page-card mb-4">
        <div class="card-body p-4 p-md-5">
          <div class="row align-items-center">
            <div class="col-md-8">
              <h2 class="fw-bold text-primary mb-2">
                <i class="bi bi-clock-history me-2"></i>
                Prediction History
              </h2>
              <p class="text-muted mb-0">
                Review your previous AI symptom analyses, confidence scores,
                severity levels, and doctor recommendations.
              </p>
            </div>

            <div class="col-md-4 text-md-end mt-4 mt-md-0">
              <a href="index.html" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>
                New Analysis
              </a>
            </div>
          </div>
        </div>
      </div>

      <div id="historyContainer">
        <div class="card page-card">
          <div class="card-body p-4">
            <div class="d-flex align-items-center text-muted">
              <div class="spinner-border spinner-border-sm me-2"></div>
              Loading prediction history...
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      fetch("/senior_project/backend/get_history.php")
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById("historyContainer");

          if (!data.success) {
            container.innerHTML = `
              <div class="alert alert-danger rounded-4 border-0 shadow-sm">
                <i class="bi bi-exclamation-circle me-2"></i>
                ${data.message}
              </div>
            `;
            return;
          }

          if (data.history.length === 0) {
            container.innerHTML = `
              <div class="card empty-state">
                <div class="card-body text-center p-5">
                  <div class="empty-icon">
                    <i class="bi bi-clipboard2-pulse"></i>
                  </div>
                  <h4 class="fw-bold text-primary">No prediction history yet</h4>
                  <p class="text-muted">
                    Start your first AI symptom analysis and your results will
                    appear here.
                  </p>
                  <a href="index.html" class="btn btn-primary">
                    <i class="bi bi-cpu me-1"></i>
                    Start Analysis
                  </a>
                </div>
              </div>
            `;
            return;
          }

          let html = "";

          data.history.forEach((item) => {
            let severityClass = "secondary";
            let severityIcon = "bi-info-circle";

            if (item.severity_level === "High") {
              severityClass = "danger";
              severityIcon = "bi-exclamation-triangle-fill";
            } else if (item.severity_level === "Medium") {
              severityClass = "warning text-dark";
              severityIcon = "bi-exclamation-circle-fill";
            } else if (item.severity_level === "Low") {
              severityClass = "success";
              severityIcon = "bi-check-circle-fill";
            }

            let confidenceValue = Number(item.confidence_score);
            let confidencePercent =
              confidenceValue <= 1
                ? Math.round(confidenceValue * 100)
                : Math.round(confidenceValue);

            html += `
              <div class="card history-card mb-4">
                <div class="card-body p-4">
                  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
                    <div>
                      <h4 class="fw-bold text-primary mb-1">
                        <i class="bi bi-activity me-2"></i>
                        ${item.predicted_disease}
                      </h4>
                      <small class="text-muted">
                        <i class="bi bi-calendar-event me-1"></i>
                        ${item.created_at}
                      </small>
                    </div>

                    <div class="mt-3 mt-md-0">
                      <span class="badge bg-${severityClass} risk-badge">
                        <i class="bi ${severityIcon} me-1"></i>
                        ${item.severity_level} Risk
                      </span>
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="info-box">
                        <div class="info-title">
                          <i class="bi bi-chat-left-text me-1"></i>
                          Input Symptoms
                        </div>
                        <p class="mb-0">${item.input_text || "Not available"}</p>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="info-box">
                        <div class="info-title">
                          <i class="bi bi-list-check me-1"></i>
                          Detected Symptoms
                        </div>
                        <p class="mb-0">
                          ${item.detected_symptoms || "Not available"}
                        </p>
                      </div>
                    </div>

                    <div class="col-md-4">
                      <div class="info-box">
                        <div class="info-title">
                          <i class="bi bi-percent me-1"></i>
                          Confidence
                        </div>
                        <h5 class="fw-bold text-success mb-2">
                          ${confidencePercent}%
                        </h5>
                        <div class="progress" style="height: 8px">
                          <div
                            class="progress-bar bg-success"
                            style="width: ${confidencePercent}%"
                          ></div>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-4">
                      <div class="info-box">
                        <div class="info-title">
                          <i class="bi bi-clock me-1"></i>
                          Duration
                        </div>
                        <p class="fw-semibold mb-0">
                          ${item.duration_days || 0} day(s)
                        </p>
                      </div>
                    </div>

                    <div class="col-md-4">
                      <div class="info-box">
                        <div class="info-title">
                          <i class="bi bi-person-plus me-1"></i>
                          Recommended Doctor
                        </div>
                        <p class="fw-bold text-primary mb-0">
                          ${item.recommended_doctor || "General Physician"}
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          });

          container.innerHTML = html;
        })
        .catch((error) => {
          document.getElementById("historyContainer").innerHTML = `
            <div class="alert alert-danger rounded-4 border-0 shadow-sm">
              <i class="bi bi-exclamation-circle me-2"></i>
              Error: ${error}
            </div>
          `;
        });

      function logout() {
        fetch("/senior_project/backend/logout.php").then(() => {
          window.location.href = "home.html";
        });
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
