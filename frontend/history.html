<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction History - AI Medical Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html"
          >AI Medical Assistant</a
        >
        <div class="ms-auto d-flex gap-2">
          <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
          <a href="index.html" class="btn btn-outline-light btn-sm">Analyzer</a>
          <a href="health_profile.html" class="btn btn-outline-light btn-sm"
            >Profile</a
          >
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="text-primary mb-4">Prediction History</h2>
          <div id="historyContainer">
            <p class="text-muted">Loading history...</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      fetch("/senior_project/backend/get_history.php")
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById("historyContainer");

          if (!data.success) {
            container.innerHTML = `
                        <div class="alert alert-danger">${data.message}</div>
                    `;
            return;
          }

          if (data.history.length === 0) {
            container.innerHTML = `
                        <div class="alert alert-info">
                            No prediction history found yet.
                        </div>
                    `;
            return;
          }

          let html = "";

          data.history.forEach((item) => {
            let severityClass = "secondary";
            if (item.severity_level === "High") severityClass = "danger";
            else if (item.severity_level === "Medium")
              severityClass = "warning";
            else if (item.severity_level === "Low") severityClass = "success";

            html += `
                        <div class="card mb-4 shadow-sm border-0 rounded-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="text-primary mb-0">${item.predicted_disease}</h5>
                                    <small class="text-muted">${item.created_at}</small>
                                </div>

                                <p><strong>Input Text:</strong> ${item.input_text}</p>
                                <p><strong>Detected Symptoms:</strong> ${item.detected_symptoms}</p>
                                <p><strong>Confidence Score:</strong> ${Math.round(item.confidence_score * 100)}%</p>
                                <p><strong>Severity Level:</strong> 
                                    <span class="badge bg-${severityClass}">${item.severity_level}</span>
                                </p>
                                <p><strong>Severity Score:</strong> ${item.severity_score}</p>
                                <p><strong>Duration:</strong> ${item.duration_days} day(s)</p>
                                <p><strong>Recommended Doctor:</strong> ${item.recommended_doctor}</p>
                            </div>
                        </div>
                    `;
          });

          container.innerHTML = html;
        })
        .catch((error) => {
          document.getElementById("historyContainer").innerHTML = `
                    <div class="alert alert-danger">Error: ${error}</div>
                `;
        });
    </script>
  </body>
</html>
