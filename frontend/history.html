<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction History - AI Medical Assistant</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
          AI Medical Assistant
        </a>

        <div class="ms-auto d-flex gap-2">
          <a href="dashboard.html" class="btn btn-light btn-sm"> Dashboard </a>

          <a href="index.html" class="btn btn-outline-light btn-sm">
            Analyzer
          </a>

          <a href="health_profile.html" class="btn btn-outline-light btn-sm">
            Profile
          </a>

          <button onclick="logout()" class="btn btn-danger btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
      <!-- Title -->
      <div class="card shadow-sm border-0 rounded-4 mb-4">
        <div class="card-body p-4">
          <h2 class="text-primary">Prediction History</h2>
          <p class="text-muted mb-0">
            View all your previous AI symptom analyses and doctor
            recommendations.
          </p>
        </div>
      </div>

      <!-- History Results -->
      <div id="historyContainer">
        <p class="text-muted">Loading history...</p>
      </div>
    </div>

    <!-- Script -->
    <script>
      fetch("/senior_project/backend/get_history.php")
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById("historyContainer");

          if (!data.success) {
            container.innerHTML = `
                        <div class="alert alert-danger">
                            ${data.message}
                        </div>
                    `;
            return;
          }

          if (data.history.length === 0) {
            container.innerHTML = `
                        <div class="alert alert-info">
                            No prediction history found yet.
                        </div>
                    `;
            return;
          }

          let html = "";

          data.history.forEach((item) => {
            let severityClass = "secondary";

            if (item.severity_level === "High") {
              severityClass = "danger";
            } else if (item.severity_level === "Medium") {
              severityClass = "warning";
            } else if (item.severity_level === "Low") {
              severityClass = "success";
            }

            html += `
                        <div class="card shadow border-0 rounded-4 mb-4">
                            <div class="card-body p-4">

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4 class="text-primary mb-0">
                                        ${item.predicted_disease}
                                    </h4>

                                    <small class="text-muted">
                                        ${item.created_at}
                                    </small>
                                </div>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Input Symptoms</h6>
                                            <p class="mb-0">${item.input_text}</p>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Detected Symptoms</h6>
                                            <p class="mb-0">${item.detected_symptoms}</p>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Confidence Score</h6>
                                            <p class="fw-bold text-success">
                                                ${Math.round(item.confidence_score * 100)}%
                                            </p>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Severity Level</h6>
                                            <span class="badge bg-${severityClass} fs-6">
                                                ${item.severity_level}
                                            </span>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Duration</h6>
                                            <p class="mb-0">
                                                ${item.duration_days} day(s)
                                            </p>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="p-3 bg-light rounded-3">
                                            <h6 class="text-muted">Recommended Doctor</h6>
                                            <p class="fw-bold text-primary mb-0">
                                                ${item.recommended_doctor}
                                            </p>
                                        </div>
                                    </div>

                                </div>

                            </div>
                        </div>
                    `;
          });

          container.innerHTML = html;
        })
        .catch((error) => {
          document.getElementById("historyContainer").innerHTML = `
                    <div class="alert alert-danger">
                        Error: ${error}
                    </div>
                `;
        });

      function logout() {
        fetch("/senior_project/backend/logout.php").then(() => {
          window.location.href = "home.html";
        });
      }
    </script>
  </body>
</html>
