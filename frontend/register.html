<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - AI Medical Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
              <h2 class="text-center text-primary mb-4">Create Account</h2>
              <p class="text-center text-muted">
                Join the AI Medical Assistant system
              </p>

              <form id="registerForm">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="name" required />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input type="text" class="form-control" id="phone" required />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input
                    type="password"
                    class="form-control"
                    id="confirm_password"
                    required
                  />
                </div>

                <div class="d-grid">
                  <button
                    type="submit"
                    class="btn btn-success btn-lg rounded-3"
                  >
                    Register
                  </button>
                </div>
              </form>

              <div id="registerMessage" class="mt-3"></div>

              <div class="text-center mt-4">
                <p class="mb-0">
                  Already have an account?
                  <a href="login.html" class="text-decoration-none"
                    >Login here</a
                  >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          let full_name = document.getElementById("name").value;
          let email = document.getElementById("email").value;
          let phone = document.getElementById("phone").value;
          let password = document.getElementById("password").value;
          let confirm_password =
            document.getElementById("confirm_password").value;
          let messageBox = document.getElementById("registerMessage");

          if (password !== confirm_password) {
            messageBox.innerHTML = `<div class="alert alert-danger">Passwords do not match.</div>`;
            return;
          }

          fetch("/senior_project/backend/register.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              full_name: full_name,
              email: email,
              phone: phone,
              password: password,
            }),
          })
            .then((response) => response.text())
            .then((data) => {
              console.log(data); // VERY IMPORTANT (check console F12)

              try {
                let json = JSON.parse(data);

                if (json.success) {
                  messageBox.innerHTML = `<div class="alert alert-success">${json.message}</div>`;
                  document.getElementById("registerForm").reset();
                } else {
                  messageBox.innerHTML = `<div class="alert alert-danger">${json.message}</div>`;
                }
              } catch (e) {
                messageBox.innerHTML = `<div class="alert alert-danger">
            Server Error:<br><pre>${data}</pre>
        </div>`;
              }
            })
            .catch((error) => {
              messageBox.innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
            });
        });
    </script>
  </body>
</html>
